<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptenboek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--paper:#fdfaf4;--ink:#1a1208;--accent:#c8622a;--accent2:#4a7c59;--muted:#8a7d6a;--border:#ddd5c0;--tag-bg:#ede8dc}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"DM Sans",sans-serif;font-weight:300;min-height:100vh}
header{padding:40px 32px 28px;border-bottom:1px solid var(--border);background:var(--paper);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
header h1{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:400;line-height:1.1}
header h1 em{font-style:italic;color:var(--accent)}
.subtitle{font-size:.82rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=text]{border:1px solid var(--border);background:var(--bg);padding:10px 16px;font-family:"DM Sans",sans-serif;font-size:.9rem;color:var(--ink);border-radius:4px;width:210px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:"DM Sans",sans-serif;border:none;border-radius:4px;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;padding:10px 20px;font-size:.9rem;font-weight:500}
.btn-primary:hover{background:#b0551f}
.btn-ghost{background:transparent;color:var(--muted);padding:8px 14px;font-size:.85rem;border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.filter-bar{padding:14px 32px;display:flex;gap:8px;flex-wrap:wrap;background:var(--paper);border-bottom:1px solid var(--border)}
.filter-btn{background:var(--tag-bg);color:var(--muted);padding:6px 14px;font-size:.8rem;border:1px solid transparent;border-radius:100px;letter-spacing:.04em}
.filter-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.filter-btn:hover:not(.active){border-color:var(--muted)}
main{padding:28px 32px;max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.card{background:var(--paper);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.card-header{padding:22px 22px 14px;border-bottom:1px solid var(--border)}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:var(--tag-bg);color:var(--muted);font-weight:500}
.tag.airfryer{background:#e8f0ea;color:var(--accent2)}
.tag.aziatisch{background:#fce8dc;color:var(--accent)}
.tag.midden-oosters{background:#e8e4f4;color:#6b5fa0}
.tag.veggie{background:#e4f0e8;color:#3d6b4a}
.tag.snel{background:#f0f0e8;color:#6b6b3d}.tag.dessert{background:#f4e8f0;color:#8b3d6b}.tag.spaans{background:#fce8e8;color:#8b3d3d}
.card h2{font-family:"Playfair Display",serif;font-size:1.2rem;font-weight:400;line-height:1.3}
.card-desc{padding:12px 22px;font-size:.84rem;color:var(--muted);line-height:1.6}
.card-meta{padding:10px 22px 16px;display:flex;gap:12px;font-size:.8rem;color:var(--muted);flex-wrap:wrap;align-items:center}
.kcal-badge{background:#fff3ec;color:var(--accent);font-weight:500;padding:3px 10px;border-radius:100px;font-size:.76rem;border:1px solid #f5d5c0}
.card-delete{position:absolute;top:10px;right:10px;background:transparent;color:var(--border);font-size:1rem;padding:4px 8px;border-radius:4px;opacity:0;transition:opacity .15s}
.card:hover .card-delete{opacity:1}
.card-delete:hover{color:#c0392b!important;background:#fde8e8}
.overlay{display:none;position:fixed;inset:0;background:rgba(20,15,5,.6);z-index:100;padding:20px;overflow-y:auto;backdrop-filter:blur(2px)}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--paper);border-radius:8px;max-width:700px;width:100%;margin:auto;overflow:hidden;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);position:relative}
.modal-header h2{font-family:"Playfair Display",serif;font-size:1.65rem;font-weight:400;line-height:1.2;padding-right:44px;margin-bottom:14px}
.modal-close{position:absolute;top:18px;right:18px;background:var(--tag-bg);color:var(--muted);font-size:1rem;padding:5px 11px;border-radius:4px}
.modal-close:hover{background:var(--border)}
.modal-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.meta-item{font-size:.82rem;color:var(--muted)}
.scaler{display:flex;align-items:center;gap:8px;background:var(--tag-bg);border-radius:100px;padding:5px 12px}
.scaler>span:first-child{font-size:.8rem;color:var(--muted)}
.scaler-val{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--ink);min-width:22px;text-align:center}
.scaler button{background:none;color:var(--muted);font-size:1.15rem;padding:0 3px;line-height:1}
.scaler button:hover{color:var(--accent)}
.kcal-info{background:#fff3ec;color:var(--accent);font-size:.8rem;font-weight:500;padding:5px 12px;border-radius:100px;border:1px solid #f5d5c0}
.modal-body{padding:24px 32px 32px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.modal-body h3{font-family:"Playfair Display",serif;font-size:1rem;font-weight:400;margin-bottom:10px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:7px}
.ingredient-list{list-style:none}
.ingredient-list li{padding:6px 0;font-size:.87rem;border-bottom:1px dotted var(--border);display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.ingredient-list li:last-child{border:none}
.ing-amount{color:var(--accent);font-size:.82rem;white-space:nowrap;font-weight:500}
.step-list{list-style:none}
.step-list li{padding:7px 0;font-size:.87rem;line-height:1.55;border-bottom:1px dotted var(--border);display:flex;gap:10px}
.step-list li:last-child{border:none}
.step-num{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--accent);min-width:18px}
.modal-notes{grid-column:1/-1;background:var(--tag-bg);border-radius:4px;padding:12px 16px;font-size:.82rem;color:var(--muted);line-height:1.6}
.modal-notes strong{color:var(--ink);display:block;margin-bottom:4px;font-size:.76rem;letter-spacing:.06em;text-transform:uppercase}
.add-form{display:flex;flex-direction:column;gap:14px}
.add-form label{font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.add-form input,.add-form textarea{width:100%;border:1px solid var(--border);background:var(--bg);padding:9px 13px;font-family:"DM Sans",sans-serif;font-size:.88rem;color:var(--ink);border-radius:4px;outline:none}
.add-form textarea{resize:vertical;min-height:80px}
.add-form input:focus,.add-form textarea:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.empty{grid-column:1/-1;text-align:center;padding:64px 32px;color:var(--muted)}
.empty p{font-family:"Playfair Display",serif;font-size:1.2rem;font-style:italic}
@media(max-width:560px){.modal-body{grid-template-columns:1fr}main{padding:16px}header{padding:24px 18px 18px}.filter-bar{padding:10px 18px}.modal-header{padding:22px 18px 16px}.modal-body{padding:18px}.form-row,.form-row-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Mijn <em>Recepten</em>boek</h1>
    <p class="subtitle">Persoonlijke collectie</p>
  </div>
  <div class="header-actions">
    <input type="text" id="search" placeholder="Zoeken..." oninput="render()">
    <button class="btn-primary" onclick="openAdd()">+ Recept toevoegen</button>
    <button class="btn-ghost" onclick="resetApp()">&#8635; Reset</button>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('alle',this)">Alle</button>
  <button class="filter-btn" onclick="setFilter('airfryer',this)">Airfryer</button>
  <button class="filter-btn" onclick="setFilter('aziatisch',this)">Aziatisch</button>
  <button class="filter-btn" onclick="setFilter('midden-oosters',this)">Midden-Oosters</button>
  <button class="filter-btn" onclick="setFilter('veggie',this)">Veggie</button>
  <button class="filter-btn" onclick="setFilter('snel',this)">Snel (&lt;30 min)</button>
  <button class="filter-btn" onclick="setFilter('dessert',this)">Dessert</button>
  <button class="filter-btn" onclick="setFilter('spaans',this)">Spaans</button>
</div>
<main><div class="grid" id="grid"></div></main>

<div class="overlay" id="viewOverlay" onclick="closeIfBg(event,'viewOverlay')">
  <div class="modal" id="viewModal"></div>
</div>

<div class="overlay" id="addOverlay" onclick="closeIfBg(event,'addOverlay')">
  <div class="modal">
    <div class="modal-header">
      <h2>Nieuw recept</h2>
      <button class="modal-close" onclick="closeAdd()">&#10005;</button>
    </div>
    <div style="padding:24px 32px 32px">
      <div class="add-form">
        <div class="form-row">
          <div><label>Naam recept *</label><input id="f-name" type="text" placeholder="bijv. Gyoza"></div>
          <div><label>Bereidingstijd</label><input id="f-time" type="text" placeholder="bijv. 30 min"></div>
        </div>
        <div><label>Omschrijving</label><input id="f-desc" type="text" placeholder="Korte omschrijving"></div>
        <div class="form-row-3">
          <div><label>Porties</label><input id="f-servings" type="text" placeholder="2"></div>
          <div><label>kcal per persoon</label><input id="f-kcal" type="text" placeholder="bijv. 400"></div>
          <div><label>Tags (komma-gescheiden)</label><input id="f-tags" type="text" placeholder="airfryer, veggie"></div>
        </div>
        <div><label>Ingredienten (1 per regel, bijv: 300g kipfilet)</label><textarea id="f-ingredients" placeholder="300g kipfilet&#10;2 paprika&#10;1 el sojasaus"></textarea></div>
        <div><label>Bereiding (1 stap per regel)</label><textarea id="f-steps" placeholder="Verwarm de airfryer op 200C&#10;Meng de kruiden"></textarea></div>
        <div><label>Notities / tips</label><textarea id="f-notes" placeholder="Optionele tips..." style="min-height:55px"></textarea></div>
        <button class="btn-primary" onclick="saveRecipe()">Recept opslaan</button>
      </div>
    </div>
  </div>
</div>

<script>
var DEFAULT = [
  {id:1,name:"Gyoza met citroengras-rawit dipsaus",desc:"Pittige Aziatische gyoza met een frisse dipsaus. Snel en makkelijk doordeweeks.",tags:["aziatisch"],time:"25 min",servings:2,kcal:480,
   ingredients:["300g gyoza (diepvries)","150g rijst","60g Kikkoman sojasaus","1 rawit, fijngesneden","1 tl gesneden citroengras","2 limoenbladen, heel fijn gesneden","15g water","1 el neutrale olie"],
   steps:["Meng sojasaus, water, rawit, citroengras en limoenblad voor de dipsaus. Laat staan.","Kook de rijst volgens verpakking.","Verhit olie in een koekenpan. Leg gyoza plat en bak 2-3 minuten tot goudbruin.","Voeg een scheut water toe, dek af en stoom 3-4 minuten.","Serveer met rijst en de dipsaus ernaast."],
   notes:"Dipsaus in grammen: 60g sojasaus, 15g water, 5g rawit, 8g citroengras, 2g limoenblad."},
  {id:2,name:"Gebakken rijst met ei, erwten en lente-ui",desc:"Klassieke gebakken rijst. Koude rijst van de dag ervoor is de sleutel.",tags:["aziatisch","snel"],time:"15 min",servings:2,kcal:420,
   ingredients:["300g koude gekookte rijst","2 eieren","80g erwten (diepvries)","3 lente-uitjes, in ringetjes","2 el Kikkoman sojasaus","1 tl vissaus","1 rawit, fijngesneden","2 el neutrale olie"],
   steps:["Verkruimel klontjes in de rijst. Ontdooi erwten onder warm water.","Verhit olie op hoogste stand. Bak de rijst 3-4 minuten tot licht gekleurd.","Maak een holletje, kluts eieren erin en roer tot bijna gestold. Dan door de rijst.","Voeg erwten en rawit toe, bak nog 1-2 minuten.","Voeg sojasaus en vissaus toe, proef en pas aan.","Serveer met lente-ui erover."],
   notes:"Gebruik een hete pan - te laag vuur geeft papperige rijst."},
  {id:3,name:"Airfryer kip met zoete aardappel en geroosterde groenten",desc:"Alles in de airfryer, weinig afwas, klaar in 30 minuten. Gezond doordeweeks.",tags:["airfryer","aziatisch"],time:"30 min",servings:2,kcal:520,
   ingredients:["300g kipfilet of kippendij","250g zoete aardappel, blokjes van 2 cm","200g paprika, in stukken","1 rode ui, in parten","40g olijfolie","1 el Kikkoman sojasaus","1 tl vissaus","3g knoflookpoeder","3g paprikapoeder","1 rawit of chilivlokken","2 limoenbladen, fijn gesneden"],
   steps:["Meng olijfolie, sojasaus, vissaus, knoflookpoeder, paprikapoeder, rawit en limoenblad.","Snijd kip in stukken van 4 cm. Gooi alles door de marinade.","Verwarm airfryer voor op 200 graden C.","Leg zoete aardappelblokjes als eerste in de airfryer. Bak 5 minuten.","Voeg kip, paprika en ui toe. Bak nog 18-20 minuten op 200 graden C. Halverwege omschudden.","Serveer direct, eventueel met extra sojasaus."],
   notes:"Smeer het rooster licht in met olie voor gebruik. Kippendij is sappiger dan filet."},
  {id:4,name:"Geroosterde aubergine met knapperige kikkererwten en tahinisaus",desc:"Midden-Oosterse geroosterde aubergine met knapperige kikkererwten, romige tahinisaus en mini naan.",tags:["airfryer","midden-oosters","veggie"],time:"35 min",servings:2,kcal:550,
   ingredients:["2 aubergines, in plakken van 1,5 cm","400g kikkererwten (blik), afgespoeld en drooggedept","40g olijfolie","3g knoflookpoeder","3g komijnpoeder","3g paprikapoeder","3g zout","45g tahini","30g citroensap","45g water","1 knoflookteen, fijngeraspt","1 handvol platte peterselie","1 handvol granaatappelpitjes (optioneel)","4 mini naans"],
   steps:["Bestrooi aubergineplakken aan beide kanten met zout. Laat 10 minuten staan, dep droog.","Meng olijfolie, knoflookpoeder, komijnpoeder, paprikapoeder en zout. Bestrijk beide kanten van de aubergine. Gooi de kikkererwten door de resterende marinade.","Smeer het rooster licht in met olie. Verwarm oven op 220 graden C met airfryer stand.","Leg aubergineplakken in een laag op het rooster. Rooster 10-12 minuten.","Draai de aubergine om en voeg de kikkererwten toe. Rooster nog 10 minuten.","Roer tahini, citroensap, water en knoflook tot gladde saus.","Warm mini naans 2-3 minuten op 180 graden C in de airfryer.","Leg aubergine op schaal, verdeel kikkererwten erover en lepel tahinisaus erover."],
   notes:"Beide kanten zouten. Kikkererwten goed droogdeppen anders worden ze niet knapperig."},
  {id:5,name:"Groene curry met kip",desc:"Thaise groene curry met zelfgemaakte kruidenpasta, kokosmelk en kip.",tags:["aziatisch"],time:"40 min",servings:2,kcal:550,
   ingredients:["300g kipfilet, in stukken","400ml kokosmelk","2 el vissaus","1 rode paprika, in reepjes","1 blik bamboo shoots","2 el neutrale olie","2,5 cm galangal of gember","3 knoflooktenen","2 groene chilipepers","2 sjalotten","1 handvol koriandersteeltjes","2 stengels citroengras, fijngesneden","1 handvol Thaise basilicum","1 el shrimp paste"],
   steps:["Blend galangal, knoflook, chilipepers, sjalotten, koriandersteeltjes, citroengras en shrimp paste tot pasta.","Verhit olie in een wok. Bak de kruidenpasta 2-3 minuten tot geurig.","Voeg de kip toe en bak rondom aan.","Giet de kokosmelk en vissaus erbij. Breng aan de kook.","Voeg paprika en bamboo shoots toe. Laat 10-15 minuten sudderen.","Proef en pas aan met vissaus. Strooi Thaise basilicum erover.","Serveer met rijst."],
   notes:"Bird-eye pepers zijn veel pittiger dan gewone groene chilipepers. Shrimp paste geeft veel diepte."},
  {id:6,name:"Gele curry met kabeljauw",desc:"Milde Thaise gele curry met verse kruidenpasta, kabeljauw en kokosmelk.",tags:["aziatisch"],time:"35 min",servings:2,kcal:500,
   ingredients:["300g kabeljauw, in stukken","400ml kokosmelk","2 el vissaus","1 tl palmsuiker of bruine suiker","200g groente naar keuze","2 el neutrale olie","0,5 tl kurkuma","1 tl korianderzaad gemalen","1 handvol koriandersteeltjes","1 rawit","2 sjalotten","2 knoflooktenen","3 cm gember","2 stengels citroengras","2 limoenbladen","1 handvol cashewnoten"],
   steps:["Blend kurkuma, korianderzaad, koriandersteeltjes, rawit, sjalotten, knoflook, gember en citroengras tot pasta.","Verhit olie in een pan. Bak de kruidenpasta 2 minuten.","Voeg kokosmelk, vissaus, palmsuiker en limoenbladen toe. Breng zachtjes aan de kook.","Voeg de groente toe en laat 5 minuten sudderen.","Leg de kabeljauw erin en pocheer 5-7 minuten op laag vuur.","Serveer met rijst en cashewnoten."],
   notes:"Kabeljauw niet roeren als hij in de pan ligt, anders valt hij uit elkaar."},
  {id:7,name:"Udon noodles stir fry",desc:"Japanse udon noodles in een umami-rijke saus met spitskool, babymais en lente-ui.",tags:["aziatisch","snel"],time:"20 min",servings:2,kcal:480,
   ingredients:["300g udon noodles","1 el bruine suiker","2 el sojasaus","1 el mirin","1 el oestersaus","1 el rijstazijn","1 el shirodashi soepstock","0,5 tl samyang buldak saus","2 knoflooktenen fijngesneden","3 cm gember fijngeraspt","3 lente-uitjes in ringetjes","1 handvol babymais gehalveerd","200g spitskool in reepjes","2 el sesamzaad","2 el gebakken uitjes","2 eieren optioneel"],
   steps:["Kook de udon noodles volgens verpakking. Afgiet en spoel af met koud water.","Meng sojasaus, bruine suiker, mirin, oestersaus, rijstazijn, shirodashi en buldak saus.","Verhit olie in een wok. Bak knoflook en gember 1 minuut.","Voeg babymais en spitskool toe. Roerbak 2-3 minuten op hoog vuur.","Voeg de noodles toe samen met de saus. Schep goed door en bak 2 minuten.","Optioneel: bak een spiegelei apart en leg bovenop.","Serveer bestrooid met sesamzaad, gebakken uitjes en lente-ui."],
   notes:"Shirodashi is te vinden bij Amazing Oriental. Buldak saus is erg pittig - begin met een kwart theelepel."},
  {id:8,name:"Garnalen roerbak met prik nam pla",desc:"Snelle roerbak met garnalen, ei en een pittige Thaise vissaus dip.",tags:["aziatisch","snel"],time:"20 min",servings:2,kcal:420,
   ingredients:["250g garnalen gepeld","2 eieren","2 el sojasaus","2 knoflooktenen fijngesneden","1 rawit fijngesneden","3 bosuitjes in ringetjes","150g rijst","1 handvol cashewnoten optioneel","2 el neutrale olie","3 el vissaus voor prik nam pla","2 limoenen sap","3-4 kleine pepertjes fijngesneden","1,5 el bruine suiker","1 el knoflook fijngesneden"],
   steps:["Kook de rijst.","Maak de prik nam pla: meng vissaus, limoensap, pepertjes, bruine suiker en knoflook. Roer tot suiker oplost.","Verhit olie in een wok. Bak knoflook en rawit 1 minuut.","Voeg garnalen toe en bak 2-3 minuten tot roze.","Schuif garnalen opzij, kluts eieren en scramble in de pan. Mix door de garnalen.","Voeg sojasaus toe en schep door.","Serveer met rijst, bosui en cashewnoten. Prik nam pla ernaast."],
   notes:"Prik nam pla is een klassieke Thaise tafelsaus. Garnalen zijn snel gaar, niet te lang bakken."},
  {id:9,name:"Nongshim Shin Kimchi ramen",desc:"Snelle upgrade van instant ramen met bleekselderij, gepocheerd ei, knoflook en crispy chili olie.",tags:["aziatisch","snel"],time:"10 min",servings:1,kcal:735,
   ingredients:["1 pak Nongshim Shin Kimchi ramen","1 ei","1 stengel bleekselderij in plakjes","1 knoflookteen fijngesneden","1 el gebakken uitjes","1 el crispy chili olie"],
   steps:["Snijd de knoflook fijn. Bak kort aan in een klein beetje olie in het pannetje tot het begint te geuren - niet laten bruinen. Giet dan het water erbij. Dit geeft de bouillon veel meer diepte.","Voeg de smaakpakketjes en noodles toe. Kook volgens verpakking (ca. 3 minuten).","Voeg de bleekselderij toe in de laatste minuut van de kooktijd voor een mooie bite.","Pocheer het ei direct in de soep de laatste 3-4 minuten, of kook apart voor zachtgekookt (6 min).","Giet de ramen in een kom en leg het ei erop. Bestrooi op het allerlaatste moment met gebakken uitjes - niet meekoken anders worden ze zompig. Druppel de crispy chili olie erover."],
   notes:"Knoflook niet laten bruinen - alleen even geuren. Gebakken uitjes pas op het allerlaatste moment toevoegen voor de crunch. Crispy chili olie van Lao Gan Ma is het lekkerst."}
,
  {id:10,name:"Gnocchi met rode pesto en gegrilde groenten",desc:"Supersnelle gnocchi met rode pesto, gegrilde groenten en parmezan. Klaar in 10 minuten.",tags:["snel","veggie"],time:"10 min",servings:2,kcal:520,
   ingredients:["400g gnocchi","200g gegrilde groenten (paprika, aubergine, artisjok, zongedroogde tomaat)","2 el rode pesto","1 handvol basilicumblaadjes","Parmezaan of pecorino, naar smaak"],
   steps:["Kook een grote pan gezouten water. Voeg de gnocchi toe en kook 2 minuten of tot ze naar het oppervlak drijven. Giet af en doe terug in de pan met een scheutje kookwater.","Voeg de gegrilde groenten (in stukken gesneden), rode pesto en basilicum toe. Schep goed door.","Serveer met Parmezaan of pecorino erover."],
   notes:"Gegrilde groenten zijn te koop bij de delicatessentoonbank van de supermarkt. Bewaar een scheut kookwater - dat helpt de pesto goed door de gnocchi te mengen."}
,
  {id:12,name:"Indian chickpeas with poached eggs",desc:"Kruidige kikkererwten met tomaat, cumin en gepocheerde eieren. Simpel, voedzaam en snel.",tags:["veggie","snel"],time:"20 min",servings:2,kcal:420,
   ingredients:["400g kikkererwten (blik), uitgelekt maar vocht bewaard","3 tomaten, in partjes","2 knoflooktenen, fijngesneden","1 gele paprika, gesneden","0,5 rode chili, fijngesneden","5 lente-uitjes, wit en groen apart","1 tl cumin","1 tl koriander","0,5 tl kurkuma","0,5 tl bouillonpoeder (Marigold)","1 el koolzaadolie","4 grote eieren","1 handvol verse koriander, grof gehakt"],
   steps:["Verhit de olie in een koekenpan. Voeg knoflook, chili en het witte deel van de lente-ui toe. Bak 5 minuten op middelhoog vuur.","Voeg de kruiden en tomaten toe en bak nog 1-2 minuten. Voeg bouillonpoeder en genoeg kikkererwtenvocht toe om alles te bevochtigen. Laat zachtjes sudderen.","Breng tegelijkertijd een grote pan water aan de kook. Pocheer de eieren 2 minuten.","Schep de kikkererwten op borden. Voeg het groene deel van de lente-ui toe. Leg de gepocheerde eieren erop en bestrooi met koriander en eventueel extra cumin."],
   notes:"Gebruik het vocht van de kikkererwten om de saus te binden. Eieren zijn klaar als het eiwit gestold is maar de dooier nog lopend. Recept van Good Food magazine, juni 2016."},
  {id:13,name:"Zoete aardappel plaattaart met feta",desc:"Knapperige plaattaart met zoete aardappel, pomodori al forno, oregano en feta. Klaar in 30 minuten.",tags:["veggie"],time:"30 min",servings:2,kcal:580,
   ingredients:["300g zoete aardappelen, in dunne plakjes van 0,5 cm","145g pomodori al forno, uitgelekt (vang 1 el olie op)","1 tl gemalen koriander","1 tl gedroogde oregano","135g bladerdeeg (vers)","75g feta","0,5 jalapeno peper, in ringetjes","Zout en peper naar smaak"],
   steps:["Verwarm de oven voor op 200 graden C.","Schil de aardappelen en snijd in dunne plakjes. Meng de opgevangen olie van de pomodori met koriander, oregano, peper en zout. Meng door de aardappelen.","Rol het bladerdeeg uit op een met bakpapier beklede bakplaat. Verdeel de aardappelplakjes dakpansgewijs over het deeg. Verdeel de pomodori erover. Verkruimel de feta erboven.","Bak ca. 20 minuten in het midden van de oven. Snijd de jalapeno in ringetjes en strooi over de taart. Serveer direct."],
   notes:"Gebruik de olie van de pomodori al forno voor extra smaak - niet weggooien. Bladerdeeg mag gerust een beetje overhangen, dat geeft een rustiek randje."},
  {id:14,name:"Kip bulgur salade met kruiden marinade",desc:"Mediterrane kip met bulgur, geroosterde groenten, yoghurt en verse kruiden. Fris en voedzaam.",tags:["aziatisch"],time:"45 min",servings:2,kcal:520,
   ingredients:["2 kipfilet porties (ca. 300g)","4 knoflooktenen","Peterselie (5g)","1 citroen","Yoghurt naturel (80g)","Komkommer (0,5)","Kippenbouillon (5,5g)","Cherrytomaatjes (200g)","1 rode ui","Bulgur tarwe (190g)","Olijfolie, peper en zout","Gedroogde chilivlokken naar smaak"],
   steps:["Verwarm de oven voor op 200-205 graden C.","Hak de peterselie fijn inclusief de steeltjes. Halveer de knoflooktenen. Hak de rode ui grof. Pel en hak de knoflook fijn.","Bereid de kruiden marinade: combineer citroensap, fijngehakte knoflook, chilivlokken, olijfolie en zout. Doe de kip door de marinade.","Leg de kip in de oven voor 15-18 minuten of tot gaar. Draai halverwege om.","Kook de bulgur met kippenbouillon 7-9 minuten tot gaar. Laat uitdampen.","Verhit olie in een pan. Roerbak de geroosterde groenten tot zacht. Voeg de rode ui toe.","Hak de gekookte kip op een snijplank. Combineer met bulgur en groenten.","Serveer met yoghurt, komkommer en citroen. Bestrooi met peterselie."],
   notes:"De kip is klaar als hij 75 graden binnenin heeft. Bulgur uitdampen met deksel op de pan geeft de beste textuur."},
  {id:15,name:"Citroen tart van Raymond Blanc",desc:"Klassieke Franse citroen tart met romige custard vulling en knapperige zanddeeg bodem. Een feestelijk dessert.",tags:["dessert"],time:"95 min",servings:4,kcal:480,
   ingredients:["120g ongezouten boter op kamertemperatuur","75g poedersuiker, gezeefd (plus extra voor bestrooien)","3 eidooiers","250g bloem","2 el water","5 middelgrote eieren","150g fijne kristalsuiker","85ml citroensap","2 el citroenschil, fijngeraspt","150ml slagroom"],
   steps:["Meng zachte boter en poedersuiker tot een creme. Klop er 2 eidooiers door. Voeg bloem toe en wrijf met vingertoppen tot kruimelig. Voeg water toe en druk samen tot een bal.","Kneed het deeg op een bebloemd werkvlak maximaal 30 seconden. Plat iets af, wikkel in plasticfolie en zet 30 minuten in de koelkast.","Maak de citroenroom: meng eieren, suiker, citroensap en rasp en klop kort. Voeg slagroom toe en klop erdoor. Zet in de koelkast.","Rol het deeg uit tot een cirkel van 3 mm dik. Bekleed een taartvorm van 24 cm. Prik de bodem in met een vork en zet 30 minuten in de koelkast. Verwarm de oven voor op 160 graden C.","Bekleed de taartbodem met aluminiumfolie en vul met droge bonen. Bak 10 minuten blind. Verwijder folie en bonen en bak nog 20 minuten.","Bestrijk de binnenkant van het deeg met de resterende eidooier en zet 1 minuut terug in de oven. Verlaag de oventemperatuur naar 140 graden C.","Verwarm de citroenroom voorzichtig in een steelpan tot max 40 graden C. Giet in de taartbodem en bak 25 minuten tot net gestold.","Laat minstens 1 uur afkoelen. Bestrooi met poedersuiker. Verwijder de taartvorm en serveer."],
   notes:"Niet te lang kneden - maximaal 30 seconden anders wordt het deeg hard. De citroenroom mag absoluut niet koken anders schift hij. Recept van Raymond Blanc uit Simple French Cookery."}
,
  {id:16,name:"Naan bread (Jamie Oliver)",desc:"Zelfgemaakte naan van Jamie Oliver met ghee, yoghurt en nigellazaadjes. Heerlijk bij curry.",tags:["veggie"],time:"115 min",servings:6,kcal:220,
   ingredients:["3,5g gedroogde gist (halve 7g zakje)","1 tl vloeibare honing","45g ghee of ongezouten boter","250g sterk witbroodmeel, plus extra voor bestuiven","3 el volle naturel yoghurt","1 el nigellazaadjes","0,5 tl zeezout"],
   steps:["Combineer de gist, honing en 125ml lauwwarm water in een kom. Zet 5 minuten apart tot het begint te bubbelen.","Smelt de ghee in een kleine pan op laag vuur. Combineer de bloem en zout in een grote kom en maak een kuiltje in het midden.","Giet 1 el gesmolten ghee in het kuiltje, gevolgd door de yoghurt en het gistmengsel. Klop de natte ingredienten samen met een vork. Voeg geleidelijk de bloem toe van de zijkanten tot een ruw deeg ontstaat. Breng samen met de handen - het moet zacht en plakkerig zijn.","Kneed het deeg op een bebloemd oppervlak ca. 5 minuten tot glad. Doe in een licht bebloemde kom.","Dek af met een schone theedoek en laat 1,5 uur rijzen op een warme plek tot verdubbeld.","Sla het deeg terug met je vuist en verdeel in 6 ballen. Rol elke portie uit tot een ovale vorm van ca. 1,5 cm dik.","Verhit een grote koekenpan zonder olie op hoog vuur. Bak elke naan 5-6 minuten tot gaar, halverwege omdraaien.","Bestrijk met de resterende ghee, bestrooi met nigellazaadjes en een snufje zout. Houd warm in de oven terwijl je de rest bakt."],
   notes:"Recept van Jamie Oliver. Het deeg moet zacht en plakkerig zijn - niet te veel bloem toevoegen. Lekker bij de groene of gele curry uit dit receptenboek."}
,
  {id:17,name:"Beef Rendang",desc:"Klassieke Maleisische droge curry met malse runderreepjes, kokosmelk en een rijke kruidenpasta. Langzaam gegaard voor maximale smaak.",tags:["aziatisch"],time:"180 min",servings:7,kcal:377,
   ingredients:["2 grote kurkumabladen of 6 kaffirlimoenbladen","1 kg genereuze stukken rundvlees (bijv. sukade)","1 tl zout","400ml kokosmelk","1 tl bruine suiker","3 stengels citroengras, gekneusd","20-30 gedroogde rode chilipepers (dili kering)","2,5 cm galangal (lengkuas)","5 middelgrote knoflooktenen","2 grote rode uien, gekwarteerd","0,25 tl gemalen kurkuma","1 el verse koriander (serbuk ketumbar)"],
   steps:["Snijd het rundvlees in 2-3 stukken afhankelijk van de grootte en week ze 10 minuten in heet water. Hak ondertussen alle overige ingredienten klaar.","Rol de gedroogde chilipepers op en snijd of scheur ze in dunne reepjes. Gebruik een mes of pair schaar. Laat de zaadjes eruit vallen als je wil. Zet apart.","Drain en spoel het rundvlees. Hak de te malen ingredienten in de volgorde: eerst citroengras 10 seconden, dan gember, dan de rode paprika, knoflook. Elke keer als het te droog is een beetje water toevoegen. Hak door tot een fijne mix.","Doe alles in een grote steelpan of Dutch oven: de gemalen ingredienten, kokosmelk, kerrie, citroengras, 3 stengels knoflook, 5 middelgrote kruidnagels, 0,25 tl kurkuma, 1 el koriander en tot slot het vlees en de kokosmelk. Voeg 250ml water toe.","Zet op laag vuur en laat minimaal 2,5 uur sudderen zonder te roeren. De rendang moet een droge curry worden.","De laatste 30 minuten regelmatig roeren want het begint in te dikken en kan aanbranden. Proef en voeg zout toe naar smaak.","Serveer. Bewaar afgedekt maximaal een week in de koelkast. Bevriest ook goed - het vlees valt daarna nog meer uit elkaar."],
   notes:"Niet roeren tot de laatste 30 minuten. Rendang hoort droog te zijn - geen saus. Hoe langer het suddert hoe beter. Lekker met rijst en de zelfgemaakte naan uit dit receptenboek."}
,
  {id:18,name:"Grilled Jalapeno Poppers",desc:"Gegrilde jalapenos gevuld met een mix van drie kazen, ingepakt in bacon. Knapperig, romig en pittig.",tags:["snel"],time:"50 min",servings:8,kcal:180,
   ingredients:["16 jalapeno pepers met steel","225g roomkaas (cream cheese)","150g geraspte Cheddar","2 el geraspte Parmezaan","1,5 tl knoflookpoeder","8 plakjes bacon, gehalveerd","Bakspray of olie voor het rooster","Tandenstokers om vast te zetten"],
   steps:["Verzamel alle ingredienten. Verwarm een buitengrill op middelhoog vuur en vet het rooster licht in.","Meng roomkaas, Cheddar, Parmezaan en knoflookpoeder in een kom tot goed gemengd.","Leg een jalapeno op een werkvlak en snijd een lange reep aan de zijkant van de peper, net genoeg om de zaden en het witte vlies bloot te leggen. Verwijder met een theelepel de zaden en het vlies zodat de holle peper overblijft. Herhaal voor alle pepers.","Hak de gesneden peperstukjes fijn en meng door het kaasmengsel. Vul elke peper met het kaasmengsel.","Wikkel elke gevulde peper in een halve plak bacon en zet vast met een tandenstoker.","Grill de jalapenos op het minder hete deel van de grill, regelmatig draaien, tot de pepers zacht zijn en de bacon bruin en knapperig is. Ongeveer 30-40 minuten.","Serveer direct."],
   notes:"Gebruik handschoenen bij het schoonmaken van de jalapenos - het sap brandt. Resterende kaasmix is heerlijk als dip voor crackers. Recept van Allrecipes."}
,
  {id:19,name:"Pasta met nduja en buffelmozzarella",desc:"Pittige Calabrese pasta met nduja worst, snacktomaatjes en romige buffelmozzarella. Klaar in 20 minuten.",tags:["snel"],time:"20 min",servings:4,kcal:498,
   ingredients:["300g rigatoni","2 el nduja","2 bollen buffelmozzarella","1 bosje basilicum","800g snacktomaatjes, gehalveerd","2 uien, fijngesneden","2 teentjes knoflook, uitgeperst","2 el olijfolie","Zwarte peper en zout naar smaak"],
   steps:["Breng een pan water aan de kook. Kook de rigatoni volgens de aanwijzing op de verpakking. Bewaar 2 el kookvocht.","Pers de knoflook uit en pel en snijd de uien fijn. Halveer de snacktomaatjes.","Verhit 1 el olijfolie in een koekenpan en fruit de knoflook en ui. Voeg 2-3 el nduja toe en de snacktomaatjes. Bak 8-10 minuten tot de tomaatjes zacht zijn. Begin met 2 el nduja - het heeft best wat pit.","Giet de rigatoni af en roer door de tomatensaus. Voeg eventueel wat kookvocht toe om de saus smeuiger te maken.","Snijd de buffelmozzarella doormidden. Schep de pasta op borden en verdeel de mozzarella erover. Garneer met verse basilicum."],
   notes:"Nduja is een zachte Calabrese worst met pit - begin met 2 el en voeg meer toe naar smaak. Ook lekker met burrata. Voeg voor wat frisheid de rasp van 1 citroen toe aan de saus."}
,
  {id:20,name:"Salmorejo",desc:"Klassieke koude Spaanse tomatensoep uit Cordoba. Romig, fris en verrassend eenvoudig.",tags:["veggie","spaans"],time:"15 min",servings:6,kcal:220,
   ingredients:["1 kg rijpe rode tomaten","120g oud wit brood (compact)","120ml extra vergine olijfolie","1 klein knoflookteentje (groene kiem verwijderd)","1 tl zout","2 hardgekookte eieren voor garnering","Iberische ham in blokjes voor garnering"],
   steps:["Snijd de tomaten in kwarten en doe in de blender. Voeg het brood in stukken toe, dan de knoflook en het zout.","Blend alles tot een gladde massa. Blend opnieuw en voeg de olijfolie in een langzame gestage stroom toe om een romige zalmorange emulsie te krijgen.","Breng op smaak met extra zout indien nodig. Let op: knoflook smaakt sterker na het rusten in de koelkast.","Zet minimaal 2 uur in de koelkast voor het serveren.","Garneer met gehakt hardgekookt ei, blokjes ham en een scheutje olijfolie."],
   notes:"Tip voor hardgekookte eieren zonder grijze dooier: breng water aan de kook met een snufje zout en een paar druppels azijn. Voeg het ei toe en kook precies 10 minuten. Van Taller Andaluz de Cocina."},
  {id:21,name:"Spinach with chickpeas",desc:"Spaanse stoofschotel met spinazie, kikkererwten en een knapperig broodpasta. Authentiek Andalusisch.",tags:["veggie","spaans"],time:"35 min",servings:6,kcal:280,
   ingredients:["900g verse spinazie","150g gekookte kikkererwten","1 kleine ui","4 knoflooktenen","2 sneetjes oud wit brood","5-6 el tomatenpuree","0,5 tl gerookte zoete paprika","1 el komijn (plus extra)","Sherryazijn","Extra vergine olijfolie","Zout"],
   steps:["Kook de spinazie 5-6 minuten en zet apart. Bewaar het kookvocht.","Verhit 4-5 el olijfolie in een grote koekenpan. Kneus en pel de knoflook en bak op laag vuur tot goudbruin. Vis eruit en doe in een vijzel.","Snijd het brood in blokjes en bak in dezelfde olie tot knapperig. Doe ook in de vijzel. Stamp samen en voeg een el spinazievocht toe om een pasta te maken.","Bak de gesnipperde ui in dezelfde pan met een snufje zout tot licht gekarameliseerd. Voeg paprika en komijn toe en roer de kikkererwten erdoor. Voeg tomatenpuree toe en bak 2 minuten tot de olie licht scheidt.","Voeg de spinazie met wat kookvocht toe, de broodpasta, 1 tl zout, nog een tl komijn en een tl sherryazijn. Meng goed en kook tot het vocht reduceert tot een romige stoofschotel.","Laat 10 minuten rusten voor het serveren."],
   notes:"Een beetje te gare spinazie werkt hier beter dan te stug. De broodpasta is de geheime smaakmaker. Van Taller Andaluz de Cocina."},
  {id:22,name:"Paella Valenciana",desc:"Authentieke Valenciaanse paella met kip, runner beans, artisjok en saffraan. Recept van een Spaanse kookles.",tags:["spaans"],time:"90 min",servings:6,kcal:480,
   ingredients:["450g rondkorrelige rijst of bomba rijst (ca. 70g pp)","1 kip (bouten en vleugels, zonder bot, vel erop)","10 sperziebonen","0,5 kop verse garrofo of boterbonen","2 verse artisjokken (indien seizoen)","200g tomatenpuree","3 knoflooktenen","7 saffraan draadjes per persoon","0,5 tl gerookte zoete paprika","Rozemarijn","Zout en extra vergine olijfolie","3 liter koud water voor kippenbouillon","1 kipkarkas en extra botten voor bouillon"],
   steps:["Maak de kippenbouillon: karkassen met water in een pan, breng aan de kook en schep periodiek het schuim eraf. Kook 30 minuten.","Zorg dat de paellapan waterpas staat. Test met een druppel olijfolie in het midden - die moet precies in het centrum blijven. Bedek de bodem met olijfolie.","Zout het vlees en bak op hoog vuur. Laat het plakken en wacht tot het loslaat voor je omdraait. Niet te veel roeren anders droogt het vlees uit.","Bereid de artisjokken (schillen, top eraf, halveren, haar verwijderen, in 6 stukken). Breek de sperziebonen en hak de knoflook fijn.","Schuif de kip naar de rand. Bak sperziebonen en artisjok met een snufje zout tot gekarameliseerd. Schuif ook naar de rand. Bak de knoflook in het midden op laag vuur tot goudbruin.","Voeg paprika toe, meng 4-5 seconden, dan tomatenpuree. Voeg garrofo toe, breng alles samen en kook 2 minuten. Voeg verkruimelde saffraan toe en roer door.","Giet kippenbouillon tot aan de klinknagels van de pan. Breng aan de kook en kook in tot net onder de klinknagels. Voeg 1 tl zout toe.","Strooi de rijst in een rechte lijn van handvat tot handvat precies tussen de klinknagels. Zet direct een timer op 18 minuten. Verdeel de rijst gelijkmatig. Kook: 5 min hoog vuur, 5 min middelhoog, 8 min laag vuur.","De laatste 30 seconden vuur omhoog, rozemarijn erop. Timer af: vuur uit, dek af met een theedoek en laat 5-8 minuten rusten voor het serveren."],
   notes:"De waterpas pan is essentieel voor egale rijstgaring. Niet roeren na het toevoegen van de rijst. Optioneel: konijnenvlees en slakken voor de echte Valenciaanse versie. Van Taller Andaluz de Cocina."},
  {id:23,name:"Lemon sorbet with cava",desc:"Ultiem simpel en feestelijk Spaans dessert. Citroenijs gemixt met cava en munt.",tags:["dessert","spaans"],time:"5 min",servings:6,kcal:180,
   ingredients:["1 liter citroensorbet of citroenijs","350ml cava","3-4 muntblaadjes plus extra voor garnering"],
   steps:["Blend citroensorbet, cava en muntblaadjes samen in een blender.","Serveer direct in een champagneglas met een rietje en een muntblaadje als garnering."],
   notes:"Zo simpel als het klinkt. Zorg dat de sorbet niet te zacht is voor het blenden. Van Taller Andaluz de Cocina."},
  {id:24,name:"Sangria",desc:"Klassieke Spaanse sangria met rood fruit, kaneel, rode wijn en brandy.",tags:["spaans"],time:"70 min",servings:6,kcal:160,
   ingredients:["0,5 appel, in plakjes","0,5 perzik of sinaasappel, in plakjes","0,5 kaneelstokje","0,375 liter rode wijn (halve fles)","50ml brandy, rum of Licor 43","1 liter citroensoda of sinaasappelsoda"],
   steps:["Doe het gesneden fruit en het kaneelstokje in een karaf. Voeg de rode wijn en brandy toe.","Laat 1 uur staan zodat het fruit kan macereren in de alcohol.","Voeg de soda toe naar smaak.","Serveer met ijsblokjes."],
   notes:"Hoe langer het fruit macereert hoe beter de smaak. Pas de hoeveelheid soda aan naar hoe zoet/sterk je het wil. Van Taller Andaluz de Cocina."}
,
  {id:25,name:"Shakshuka Light",desc:"Eieren gepocheerd in een pittige tomatensaus. Snel, gezond en heerlijk met vers brood.",tags:["veggie","midden-oosters","snel"],time:"15 min",servings:2,kcal:280,
   ingredients:["400g tomatenblokjes (blik)","2-3 eieren","1 ui, fijngesneden","1 knoflookteen, fijngesneden","1 rode paprika, fijngesneden (optioneel)","1 tl komijn","1 tl paprikapoeder","Snufje chilipoeder","Zout naar smaak","2 el olijfolie","Feta voor garnering (optioneel)","Verse peterselie (optioneel)","Vers brood om te dippen"],
   steps:["Snijd ui, knoflook en paprika fijn. Fruit ze zacht in olijfolie op middelhoog vuur, 3-4 minuten.","Voeg komijn en paprikapoeder toe en roer kort mee tot het geurt.","Schenk de tomatenblokjes erbij met een snufje zout en chili. Laat 5 minuten inkoken tot de saus wat indikt.","Maak kuiltjes in de saus en breek de eieren erin. Deksel erop en 5-6 minuten op laag vuur tot het eiwit gestold is maar de dooier nog zacht.","Bestrooi met feta en peterselie. Serveer met vers brood."],
   notes:"Niet te lang met de eieren - een zachte dooier maakt het gerecht. Lekker met naan uit dit receptenboek."}
,
  {id:26,name:"Mediterrane couscous salade met gemarineerde kip",desc:"Sappige gemarineerde kip op een frisse couscous salade met zongedroogde tomaat, olijven en feta.",tags:["spaans"],time:"30 min",servings:2,kcal:520,
   ingredients:["2 kipfilets","3 el olijfolie","1 citroen, sap en rasp","2 knoflooktenen, fijngeraspt","1 tl gedroogde oregano","0,5 tl chilivlokken","160g couscous","200ml kokend kippenbouillon","80g zongedroogde tomaten, in reepjes","60g zwarte of groene olijven","80g feta, verkruimeld","0,5 komkommer, in blokjes","1 handvol verse basilicum of peterselie","2 el extra vergine olijfolie voor de salade"],
   steps:["Meng olijfolie, citroensap en rasp, knoflook, oregano en chilivlokken. Leg de kipfilets in de marinade en laat minimaal 20 minuten staan.","Giet de kokende kippenbouillon over de couscous. Voeg een snufje zout en scheutje olijfolie toe. Dek af en laat 5 minuten staan. Maak los met een vork.","Bak de kip in een hete pan of grill 4-5 minuten per kant tot goudbruin en gaar. Laat 3 minuten rusten voor het snijden.","Meng de couscous met zongedroogde tomaten, olijven, komkommer en de extra olijfolie. Breng op smaak met zout, peper en extra citroensap.","Verdeel de couscous salade over de borden. Snijd de kip in plakken en leg erbovenop. Bestrooi met feta en kruiden."],
   notes:"Kip de avond van tevoren marineren geeft de beste smaak. De olie van de zongedroogde tomaten is heerlijk als extra dressing. Koud ook lekker als lunchsalade de volgende dag."}
];

var recipes = [];
var activeFilter = "alle";
var currentServings = {};

function load() {
  recipes = JSON.parse(JSON.stringify(DEFAULT));
  render();
}

function resetApp() {
  recipes = JSON.parse(JSON.stringify(DEFAULT));
  render();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});
  el.classList.add("active");
  render();
}

function render() {
  var q = document.getElementById("search").value.toLowerCase();
  var grid = document.getElementById("grid");
  var list = recipes.filter(function(r) {
    var mQ = !q || r.name.toLowerCase().indexOf(q)>-1 || r.desc.toLowerCase().indexOf(q)>-1 || r.tags.some(function(t){return t.indexOf(q)>-1});
    var mF = activeFilter==="alle" || r.tags.indexOf(activeFilter)>-1 || (activeFilter==="snel" && parseInt(r.time)<=30);
    return mQ && mF;
  });
  if (!list.length) { grid.innerHTML="<div class=\"empty\"><p>Geen recepten gevonden.</p></div>"; return; }
  grid.innerHTML = list.map(function(r) {
    return "<div class=\"card\" onclick=\"viewRecipe("+r.id+")\">"
      +"<button class=\"card-delete\" onclick=\"event.stopPropagation();deleteRecipe("+r.id+")\">&times;</button>"
      +"<div class=\"card-header\"><div class=\"card-tags\">"+r.tags.map(function(t){return "<span class=\"tag "+t+"\">"+t+"</span>"}).join("")+"</div>"
      +"<h2>"+r.name+"</h2></div>"
      +"<div class=\"card-desc\">"+r.desc+"</div>"
      +"<div class=\"card-meta\">"
      +(r.time?"<span>&#9201; "+r.time+"</span>":"")
      +(r.servings?"<span>&#127869; "+r.servings+" p.</span>":"")
      +(r.kcal?"<span class=\"kcal-badge\">~"+r.kcal+" kcal/p</span>":"")
      +"</div></div>";
  }).join("");
}

function parseIng(str) {
  var m = str.match(/^([\d.,]+)\s*(g|kg|ml|l|el|tl|handvol|blik|teen)?\s+(.+)/i);
  if (m) { return {amount:parseFloat(m[1].replace(",",".")),unit:m[2]||"",name:m[3]}; }
  return {amount:1,unit:"",name:str};
}

function fmt(n) {
  if (n===Math.floor(n)) return String(Math.floor(n));
  return String(Math.round(n*10)/10).replace(".",",");
}

function viewRecipe(id) {
  var r = recipes.find(function(x){return x.id===id});
  if (!r) return;
  if (!currentServings[id]) currentServings[id] = r.servings||2;
  renderModal(r, currentServings[id]);
  document.getElementById("viewOverlay").classList.add("open");
}

function renderModal(r, servings) {
  var base = r.servings||2;
  var factor = servings/base;
  var modal = document.getElementById("viewModal");
  var ings = r.ingredients.map(function(i) {
    var p = parseIng(i);
    var a = fmt(p.amount*factor);
    var amt = p.unit ? a+p.unit : a;
    return "<li><span>"+p.name+"</span><span class=\"ing-amount\">"+amt+"</span></li>";
  }).join("");
  var steps = r.steps.map(function(s,i){
    return "<li><span class=\"step-num\">"+(i+1)+"</span><span>"+s+"</span></li>";
  }).join("");
  var kcalInfo = r.kcal ? "<div class=\"kcal-info\">~"+r.kcal+" kcal/p &middot; ~"+(r.kcal*servings)+" kcal totaal</div>" : "";
  modal.innerHTML = "<div class=\"modal-header\">"
    +"<div class=\"card-tags\" style=\"margin-bottom:10px\">"+r.tags.map(function(t){return "<span class=\"tag "+t+"\">"+t+"</span>"}).join(" ")+"</div>"
    +"<h2>"+r.name+"</h2>"
    +"<div class=\"modal-meta\">"
    +(r.time?"<div class=\"meta-item\">&#9201; "+r.time+"</div>":"")
    +"<div class=\"scaler\"><span>Porties</span>"
    +"<button onclick=\"changeServings("+r.id+",-1)\">&#8722;</button>"
    +"<span class=\"scaler-val\">"+servings+"</span>"
    +"<button onclick=\"changeServings("+r.id+",1)\">&#43;</button></div>"
    +kcalInfo+"</div>"
    +"<button class=\"modal-close\" onclick=\"document.getElementById(&quot;viewOverlay&quot;).classList.remove(&quot;open&quot;)\">&#10005;</button>"
    +"</div>"
    +"<div class=\"modal-body\">"
    +"<div><h3>Ingredienten</h3><ul class=\"ingredient-list\">"+ings+"</ul></div>"
    +"<div><h3>Bereiding</h3><ol class=\"step-list\">"+steps+"</ol></div>"
    +(r.notes?"<div class=\"modal-notes\"><strong>Tips</strong>"+r.notes+"</div>":"")
    +"</div>";
}

function changeServings(id, delta) {
  var r = recipes.find(function(x){return x.id===id});
  if (!r) return;
  currentServings[id] = Math.max(1,(currentServings[id]||r.servings||2)+delta);
  renderModal(r, currentServings[id]);
}

function closeIfBg(e,id) {
  if (e.target===document.getElementById(id)) document.getElementById(id).classList.remove("open");
}

function openAdd() {
  ["f-name","f-time","f-desc","f-servings","f-kcal","f-tags","f-ingredients","f-steps","f-notes"].forEach(function(id){document.getElementById(id).value=""});
  document.getElementById("addOverlay").classList.add("open");
}

function closeAdd() { document.getElementById("addOverlay").classList.remove("open"); }

function saveRecipe() {
  var name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Geef het recept een naam."); return; }
  var newR = {
    id: Date.now(), name: name,
    time: document.getElementById("f-time").value.trim(),
    desc: document.getElementById("f-desc").value.trim(),
    servings: parseInt(document.getElementById("f-servings").value)||2,
    kcal: parseInt(document.getElementById("f-kcal").value)||null,
    tags: document.getElementById("f-tags").value.split(",").map(function(t){return t.trim().toLowerCase()}).filter(Boolean),
    ingredients: document.getElementById("f-ingredients").value.split("\n").map(function(l){return l.trim()}).filter(Boolean),
    steps: document.getElementById("f-steps").value.split("\n").map(function(l){return l.trim()}).filter(Boolean),
    notes: document.getElementById("f-notes").value.trim()
  };
  recipes.unshift(newR);
  closeAdd(); render();
}

function deleteRecipe(id) {
  if (!confirm("Recept verwijderen?")) return;
  recipes = recipes.filter(function(r){return r.id!==id});
  render();
}

load();
</script>
</body>
</html>
